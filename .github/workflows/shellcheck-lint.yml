---
name: Shell script lint
on:
  - pull_request

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: true

      - name: shellcheck
        shell: bash
        run: |
          for FILE in $(find . -type f -iname "*.sh" | grep -v test | sed 's/\.\///')
          do
            shellcheck $FILE
          done
